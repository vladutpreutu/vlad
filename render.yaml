services:
  - type: web
    name: gestionar-sarcini
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: EXPIRARE_TOKEN_MINUTE
        value: 30
