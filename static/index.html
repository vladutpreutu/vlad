<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sarcini App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        
        <div id="auth-section" class="card p-4 shadow">
            <h3>Autentificare</h3>
            <input type="text" id="email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="parola" class="form-control mb-2" placeholder="Parola">
            <button onclick="login()" class="btn btn-primary w-100">Intră</button>
            <p class="mt-3 text-center">Nu ai cont? <a href="#" onclick="toggleAuth('register')">Înregistrează-te</a></p>
        </div>

        <div id="register-section" class="card p-4 shadow d-none">
            <h3>Înregistrare</h3>
            <input type="text" id="reg-email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="reg-parola" class="form-control mb-2" placeholder="Parola">
            <button onclick="register()" class="btn btn-success w-100">Creează Cont</button>
            <p class="mt-3 text-center">Ai deja cont? <a href="#" onclick="toggleAuth('login')">Intră aici</a></p>
        </div>

        <div id="task-section" class="card p-4 shadow d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Sarcinile mele</h3>
                <button onclick="logout()" class="btn btn-danger btn-sm">Ieșire</button>
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="filtru" onchange="loadTasks()">
                <label class="form-check-label" for="filtru">Doar nefinalizate</label>
            </div>
            <div class="input-group mb-3">
                <input type="text" id="titlu-nou" class="form-control" placeholder="Titlu...">
                <button onclick="addTask()" class="btn btn-success">Adaugă</button>
            </div>
            <ul id="task-list" class="list-group"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
